name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: "release"}
          - {os: macOS-latest, r: "release"}
          - {os: windows-latest, r: "release"}
          - {os: ubuntu-latest, r: "oldrel-1"}
          - {os: ubuntu-latest, r: "devel", http-user-agent: "release"}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Pinned to a full-length commit SHA for immutability; Dependabot updates this reference.
      - uses: r-lib/actions/check-r-package@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          args: 'c("--no-manual")'
